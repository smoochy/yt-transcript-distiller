name: Sync upstream

on:
  schedule:
    - cron: "0 3 * * 1"  # Mon 03:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.SYNC_PAT }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/michaelruck/yt-transcript-distiller.git || true

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Fast-forward merge
        run: git merge --ff-only upstream/main

      - name: Push
        run: git push origin main

      - name: Trigger composite rebase
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SYNC_PAT }}
          event-type: upstream-synced
