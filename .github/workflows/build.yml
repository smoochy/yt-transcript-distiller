name: Build extension

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Sign with AMO (unlisted)
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          rm -f web-ext-artifacts/*.xpi
          npx web-ext sign --channel=unlisted \
            --api-key="$AMO_JWT_ISSUER" \
            --api-secret="$AMO_JWT_SECRET"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yt-transcript-distiller-${{ github.sha }}
          path: web-ext-artifacts/*.xpi

      - name: Check if release tag already exists (auto mode only)
        if: github.event_name == 'push'
        id: already_tagged
        run: |
          git fetch --tags --quiet
          VERSION=$(awk '/^## \[/{gsub(/^## \[|\].*$/, ""); print; exit}' CHANGELOG.md)
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute release tag
        if: steps.already_tagged.outputs.skip != 'true'
        id: tag
        run: |
          VERSION=$(awk '/^## \[/{gsub(/^## \[|\].*$/, ""); print; exit}' CHANGELOG.md)
          TAG="v${VERSION}"
          BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## /{exit} found && NF{print}" CHANGELOG.md)
          if [ -z "$BODY" ]; then BODY="No changelog entry for ${VERSION}."; fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          DELIMITER="EOF_$(openssl rand -hex 8)"
          echo "body<<${DELIMITER}" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "${DELIMITER}" >> "$GITHUB_OUTPUT"

      - name: Delete existing release if same tag exists (manual mode only)
        if: github.event_name == 'workflow_dispatch' && steps.tag.outputs.tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if gh release view "$TAG" &>/dev/null; then
            gh release delete "$TAG" --yes --cleanup-tag
          fi

      - name: Create GitHub Release
        if: steps.already_tagged.outputs.skip != 'true' && steps.tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          files: web-ext-artifacts/*.xpi
          body: ${{ steps.tag.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
